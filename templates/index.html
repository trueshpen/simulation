<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evoluční simulace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <h1>Evoluční simulace</h1>
    <div class="controls">
        <button id="startButton">Zastavit</button>
        <button id="restartButton">Restartovat</button>
    </div>
    <canvas id="simulationCanvas" width="800" height="800"></canvas>
    <div class="stats">
        <div><b>Čas:</b> <span id="stat-time">0s</span></div>
        <div><b>Býložravci:</b> <span id="stat-herbivores">0</span></div>
        <div><b>Masožravci:</b> <span id="stat-carnivores">0</span></div>
        <div><b>Jídlo:</b> <span id="stat-food">0</span></div>
        <div><b>Průměrný zrak:</b> <span id="stat-vision">0</span></div>
        <div><b>Průměrná rychlost:</b> <span id="stat-speed">0</span></div>
    </div>
    <script src="{{ url_for('static', filename='simulation.js') }}"></script>
</body>
</html>
