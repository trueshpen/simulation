<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evoluční simulace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v={{ asset_version('styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="title">Evoluční simulace</div>
        <button id="restartButton" title="Restartovat simulaci">↻ Restart</button>
    </div>
    <div class="main-layout">
        <div class="lists-area">
            <div class="creature-list creature-list--herb">
                <div class="creature-list-header">Býložravci</div>
                <div class="creature-list-scroll">
                    <table class="creature-table">
                        <thead>
                            <tr>
                                <th class="col-id">#</th>
                                <th class="col-species">Věk</th>
                                <th class="col-speed">Rychl.</th>
                                <th class="col-vision">Zrak</th>
                            </tr>
                        </thead>
                        <tbody id="herb-list-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="creature-list creature-list--carn">
                <div class="creature-list-header">Masožravci</div>
                <div class="creature-list-scroll">
                    <table class="creature-table">
                        <thead>
                            <tr>
                                <th class="col-id">#</th>
                                <th class="col-species">Věk</th>
                                <th class="col-speed">Rychl.</th>
                                <th class="col-vision">Zrak</th>
                            </tr>
                        </thead>
                        <tbody id="carn-list-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="creature-list creature-list--croc">
                <div class="creature-list-header">Krokodýli</div>
                <div class="creature-list-scroll">
                    <table class="creature-table">
                        <thead>
                            <tr>
                                <th class="col-id">#</th>
                                <th class="col-species">Věk</th>
                                <th class="col-speed">Rychl.</th>
                                <th class="col-vision">Zrak</th>
                            </tr>
                        </thead>
                        <tbody id="croc-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <canvas id="simulationCanvas" width="1000" height="1000"></canvas>
        <div class="right-column">
            <div class="stats">
                <div><b>Čas:</b> <span id="stat-time">0s</span></div>
                <div><b>Býložravci:</b> <span id="stat-herbivores">0</span></div>
                <div><b>Masožravci:</b> <span id="stat-carnivores">0</span></div>
                <div><b>Krokodýli:</b> <span id="stat-crocodiles">0</span></div>
                <div><b>Jídlo:</b> <span id="stat-food">0</span></div>
                <div><b>Průměrný zrak:</b> <span id="stat-vision">0</span></div>
                <div><b>Průměrná rychlost:</b> <span id="stat-speed">0</span></div>
            </div>
            <div class="log-panel">
                <div class="log-header">Historie</div>
                <div class="log-scroll">
                    <table class="stat-table">
                        <thead>
                            <tr>
                                <th>Čas</th>
                                <th>B</th>
                                <th>M</th>
                                <th>K</th>
                                <th>Zrak #</th>
                                <th>Zrak</th>
                            </tr>
                        </thead>
                        <tbody id="log-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='simulation.js') }}?v={{ asset_version('simulation.js') }}"></script>
</body>
</html>
